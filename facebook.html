<!DOCTYPE html>
<html lang-en>
    <head>
        <title>https://www.facebook.com/</title>
        <link rel="stylesheet" href="facebook.css">
    </head>
    <body>
    <div class="Box">
        <div class="leftbox">
         <p class="Fb">facebook</p>
         <p class="Fbc">Connect with friends and the world<br>
          around you on Facebook.</p>
         </div>
         <div class="rightbox">
            <div class="formbox">
            <form>
                <div class="input">
                <input type="text" placeholder="Email address or phone number" style="width:350px; height:50px; border-radius:6px; border-color:lightgray; padding-left:20px; font-size: 20px;"><br>
                <br><input type="Password" placeholder="password" style="width:350px; height:50px; border-radius:6px; border-color: lightgray; padding-left:20px; font-size: 20px;"><br>
                <br><input type="submit" value="Log in"style="width:380px; height:50px; border-radius:6px; background-color:#0866ff; color: white; font-size:20px;"><br>
                <br><a href="https://www.facebook.com/login/identify/?ctx=recover&ars=facebook_login&from_login_screen=0" style="display: flex; justify-content: center; text-decoration: none; color:#0866ff;">Forgotten Password?</a>
                </div>
                <div class="line"></div>
                <div class="Signup">
                    <a href="https://www.facebook.com/r.php?entry_point=login" style="color:white; text-decoration: none; font-size: 18px; font-weight: 500;">Create new account</a>
                </div>
            </div>
            </form>
            <div class="Page">
            <p><a href="https://web.facebook.com/pages/create/?ref_type=registration_form" style="text-decoration: none; color:black;"><b>Create a Page</b></a> for a celebrity, brand or business</p>
            </div>
        </div>
    </div>
    </body>
</html>
