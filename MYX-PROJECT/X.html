<!DOCTYPE html>
<html lang-En>
    <head>

                </div>
                <div class="Alogo">

            <div class="customer">
            <h3>Already have an account?</h3>
            <form>
                <input type="text" placeholder="Sign in" style="width:300px; height:40px; border-radius: 50px; text-align: center;"><br><br>

            </div>
